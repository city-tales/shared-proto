syntax = "proto3";
package emailSignUp;

import "./device.proto";

message UserEmailSignUpRequest {
    string email = 1;
    string password = 2;
    string name = 3;
    string username = 4;
    uint32 phoneNumber = 5;
    uint32 alternatePhone = 6;
}

message EmailSignUpRequest {
    UserEmailSignUpRequest userEmailSignUpRequest = 1;
    device.DeviceInformation userDeviceInformation = 2;
}

message EmailSignUpResponse {}