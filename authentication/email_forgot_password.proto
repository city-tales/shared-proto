syntax = "proto3";
package emailForgotPassword;

import "./device.proto";

message UserEmailForgotPasswordRequest {
    string email = 1;
}

message EmailForgotPasswordRequest {
    UserEmailForgotPasswordRequest userEmailForgotPasswordRequest = 1;
    device.DeviceInformation userDeviceInformation = 2;
}

message EmailForgotPasswordResponse {
    string token = 1;
    string message = 2;
    uint32 statusCode = 3;
    string name = 4;
}