syntax = "proto3";
package emailLogin;

import "./device.proto";

message UserEmailLoginRequest {
    string email = 1;
    string password = 2;
}

message EmailLoginRequest {
    UserEmailLoginRequest userEmailLoginRequest = 1;
    device.DeviceInformation userDeviceInformation = 2;
}

message EmailLoginResponse {
    string name = 1;
    string token = 2;
    string message = 3;
    uint32 statusCode = 4;
    bool retryVerification = 5;
}