syntax = "proto3";
package passwordlessAuthentication;

import "./device.proto";

message UserPasswordlessAuthentication {
    string name = 1;
    string email = 2;
}

message PasswordlessAuthenticationRequest {
    UserPasswordlessAuthentication userPasswordlessAuthenticationRequest = 1;
    device.DeviceInformation userDeviceInformation = 2;
}

message PasswordlessAuthenticationResponse {
    string token = 1;
    string message = 2;
    uint32 statusCode = 3;
}